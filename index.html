<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>贪吃蛇小游戏</title>
  <style>
    /* 页面基础样式：使用系统字体，保证 Chrome、Safari 等现代浏览器表现稳定 */
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      color: #24313d;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 201, 92, 0.24), transparent 28%),
        radial-gradient(circle at 80% 15%, rgba(69, 168, 255, 0.18), transparent 26%),
        linear-gradient(135deg, #f5f7fb 0%, #e6eef4 52%, #f8f3e8 100%);
      padding: 24px;
    }

    body.mobile-device {
      align-items: flex-start;
      padding: 10px;
      overscroll-behavior: none;
    }

    .game-shell {
      width: min(960px, 100%);
      display: grid;
      grid-template-columns: minmax(280px, 520px) minmax(240px, 1fr);
      gap: 20px;
      align-items: stretch;
    }

    .board-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 560px;
      padding: 18px;
      border: 1px solid rgba(35, 49, 61, 0.14);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 18px 50px rgba(42, 55, 70, 0.16);
      backdrop-filter: blur(8px);
      touch-action: none;
    }

    canvas {
      width: min(100%, 500px);
      aspect-ratio: 1 / 1;
      border-radius: 6px;
      background: #16222d;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      touch-action: none;
    }

    .side-panel {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 16px;
      min-height: 560px;
      padding: 22px;
      border: 1px solid rgba(35, 49, 61, 0.14);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 18px 50px rgba(42, 55, 70, 0.12);
    }

    .title-block h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .title-block p {
      margin: 0;
      color: #627181;
      line-height: 1.7;
      font-size: 15px;
    }

    .score-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .score-item {
      padding: 16px;
      border-radius: 8px;
      border: 1px solid rgba(35, 49, 61, 0.12);
      background: #fbfcfd;
    }

    .score-item span {
      display: block;
      margin-bottom: 8px;
      color: #687789;
      font-size: 13px;
    }

    .score-item strong {
      display: block;
      font-size: 30px;
      line-height: 1;
      color: #16222d;
    }

    .status {
      min-height: 52px;
      padding: 14px 16px;
      border-left: 4px solid #2f9b73;
      border-radius: 6px;
      color: #33414f;
      background: #eef8f2;
      line-height: 1.5;
      font-size: 14px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .mobile-controls {
      display: none;
      justify-items: center;
      gap: 8px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(35, 49, 61, 0.12);
      background: #f8fafb;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .mobile-controls__row {
      display: grid;
      grid-template-columns: repeat(3, 58px);
      gap: 8px;
      justify-content: center;
    }

    .mobile-controls button {
      width: 58px;
      height: 52px;
      min-height: 52px;
      padding: 0;
      border-radius: 8px;
      font-size: 24px;
      line-height: 1;
      box-shadow: 0 8px 16px rgba(24, 120, 92, 0.18);
      touch-action: manipulation;
    }

    .mobile-controls button:disabled {
      opacity: 0;
      pointer-events: none;
    }

    .mobile-controls .pause-touch {
      color: #21313f;
      background: #f0c04f;
      font-size: 15px;
    }

    button {
      min-height: 44px;
      border: 0;
      border-radius: 6px;
      padding: 0 18px;
      color: #ffffff;
      background: #18785c;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.16s ease, background 0.16s ease, box-shadow 0.16s ease;
      box-shadow: 0 8px 18px rgba(24, 120, 92, 0.24);
    }

    button:hover {
      background: #146b52;
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    button.secondary {
      color: #21313f;
      background: #f0c04f;
      box-shadow: 0 8px 18px rgba(210, 151, 27, 0.22);
    }

    button.secondary:hover {
      background: #e5b23a;
    }

    .tips {
      margin: 0;
      padding-left: 18px;
      color: #647385;
      line-height: 1.75;
      font-size: 14px;
    }

    @media (max-width: 820px) {
      body {
        align-items: flex-start;
        padding: 14px;
      }

      .game-shell {
        grid-template-columns: 1fr;
      }

      .board-wrap,
      .side-panel {
        min-height: auto;
      }

      .side-panel {
        padding: 18px;
      }
    }

    @media (max-width: 640px), (pointer: coarse) {
      body.mobile-device {
        min-height: 100svh;
        overflow: hidden;
      }

      body.mobile-device .game-shell {
        width: 100%;
        min-height: calc(100svh - 20px);
        gap: 10px;
      }

      body.mobile-device .board-wrap {
        padding: 8px;
        border-radius: 8px;
      }

      body.mobile-device canvas {
        width: min(100%, calc(100vh - 330px), 420px);
        min-width: 280px;
      }

      body.mobile-device .side-panel {
        gap: 10px;
        padding: 14px;
      }

      body.mobile-device .title-block,
      body.mobile-device .tips {
        display: none;
      }

      body.mobile-device .score-item {
        padding: 12px;
      }

      body.mobile-device .score-item strong {
        font-size: 25px;
      }

      body.mobile-device .status {
        min-height: 38px;
        padding: 8px 10px;
        font-size: 13px;
      }

      body.mobile-device .actions {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
      }

      body.mobile-device .actions button {
        width: 100%;
        min-height: 38px;
        padding: 0 6px;
        font-size: 13px;
      }

      body.mobile-device .mobile-controls {
        display: grid;
        padding: 8px;
      }

      body.mobile-device .mobile-controls__row {
        grid-template-columns: repeat(3, 48px);
        gap: 6px;
      }

      body.mobile-device .mobile-controls button {
        width: 48px;
        height: 42px;
        min-height: 42px;
      }
    }

    @media (orientation: portrait) and (pointer: coarse) {
      body.mobile-device .game-shell {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }

      body.mobile-device canvas {
        width: min(100%, calc(100svh - 330px), 420px);
        min-width: 0;
      }
    }

    @media (orientation: landscape) and (pointer: coarse) {
      body.mobile-device {
        align-items: center;
      }

      body.mobile-device .game-shell {
        grid-template-columns: minmax(280px, calc(100svh - 24px)) minmax(220px, 300px);
        align-items: center;
        height: calc(100svh - 20px);
      }

      body.mobile-device .board-wrap {
        min-height: auto;
        height: 100%;
      }

      body.mobile-device canvas {
        width: min(100%, calc(100svh - 40px), 500px);
        min-width: 260px;
      }

      body.mobile-device .side-panel {
        height: 100%;
        min-height: auto;
        justify-content: center;
        overflow: hidden;
      }
    }
  </style>
</head>
<body>
  <main class="game-shell" aria-label="贪吃蛇小游戏">
    <section class="board-wrap">
      <!-- Canvas 是游戏的唯一绘制区域；宽高使用固定像素，CSS 负责自适应缩放 -->
      <canvas id="gameCanvas" width="500" height="500" aria-label="游戏画布"></canvas>
    </section>

    <aside class="side-panel">
      <div class="title-block">
        <h1>贪吃蛇</h1>
        <p>使用方向键或 W A S D 控制移动，吃到食物会增长，撞墙或咬到自己即游戏结束。</p>
      </div>

      <div class="score-grid" aria-label="分数信息">
        <div class="score-item">
          <span>当前分数</span>
          <strong id="score">0</strong>
        </div>
        <div class="score-item">
          <span>最高分</span>
          <strong id="bestScore">0</strong>
        </div>
      </div>

      <div id="status" class="status">点击开始按钮，准备第一局。</div>

      <div class="actions">
        <button id="startBtn" type="button">开始游戏</button>
        <button id="restartBtn" class="secondary" type="button">重新开始</button>
        <button id="modeBtn" class="secondary" type="button">穿墙模式：关</button>
      </div>

      <div id="mobileControls" class="mobile-controls" aria-label="手机触控方向键">
        <div class="mobile-controls__row">
          <button type="button" disabled aria-hidden="true"></button>
          <button type="button" data-direction="up" aria-label="向上">▲</button>
          <button type="button" disabled aria-hidden="true"></button>
        </div>
        <div class="mobile-controls__row">
          <button type="button" data-direction="left" aria-label="向左">◀</button>
          <button type="button" class="pause-touch" data-action="pause" aria-label="暂停或继续">暂停</button>
          <button type="button" data-direction="right" aria-label="向右">▶</button>
        </div>
        <div class="mobile-controls__row">
          <button type="button" disabled aria-hidden="true"></button>
          <button type="button" data-direction="down" aria-label="向下">▼</button>
          <button type="button" disabled aria-hidden="true"></button>
        </div>
      </div>

      <ul class="tips">
        <li>按空格键可暂停或继续。</li>
        <li>电脑端游戏结束后按空格可快速重开。</li>
        <li>穿墙模式开启后，撞到边界会从对侧出现。</li>
        <li>移动中不能直接反向掉头。</li>
        <li>游戏速度会随分数逐步提升。</li>
      </ul>
    </aside>
  </main>

  <script>
    /*
      贪吃蛇核心实现说明：
      1. 将画布划分为固定网格，每个蛇身节点和食物都占用一个格子。
      2. 每一帧根据当前方向生成新的蛇头。
      3. 如果吃到食物，则保留尾巴，让身体自然变长；否则删除尾巴，形成移动效果。
      4. 每次移动后检测撞墙和自撞，命中则结束游戏。
    */

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const boardWrap = document.querySelector(".board-wrap");
    const scoreEl = document.getElementById("score");
    const bestScoreEl = document.getElementById("bestScore");
    const statusEl = document.getElementById("status");
    const startBtn = document.getElementById("startBtn");
    const restartBtn = document.getElementById("restartBtn");
    const modeBtn = document.getElementById("modeBtn");
    const mobileControls = document.getElementById("mobileControls");
    const pauseTouchBtn = mobileControls.querySelector("[data-action='pause']");

    // 网格尺寸：500 / 20 = 25，所以游戏区域是 25 x 25 个格子。
    const cellSize = 20;
    const tileCount = canvas.width / cellSize;
    const boardCache = document.createElement("canvas");
    const boardCacheCtx = boardCache.getContext("2d");
    boardCache.width = canvas.width;
    boardCache.height = canvas.height;

    // 游戏状态集中管理，避免全局变量散落造成维护困难。
    let snake;
    let food;
    let direction;
    let nextDirection;
    let score;
    let bestScore = Number(localStorage.getItem("snakeBestScore") || 0);
    let gameTimer = null;
    let currentSpeed = 0;
    let gameRunning = false;
    let gamePaused = false;
    let gameOver = false;
    let wrapMode = false;
    let swipeStartX = 0;
    let swipeStartY = 0;
    const swipeThreshold = 24;

    const directionMap = {
      up: { x: 0, y: -1 },
      down: { x: 0, y: 1 },
      left: { x: -1, y: 0 },
      right: { x: 1, y: 0 }
    };

    bestScoreEl.textContent = bestScore;

    /**
     * 初始化一局游戏的数据。
     * 蛇从画布中间开始，默认向右移动。
     */
    function resetGame() {
      const center = Math.floor(tileCount / 2);

      snake = [
        { x: center, y: center },
        { x: center - 1, y: center },
        { x: center - 2, y: center }
      ];

      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      gameRunning = false;
      gameOver = false;
      gamePaused = false;
      scoreEl.textContent = score;
      updatePauseButtonLabel();
      updateStartButtonLabel();
      statusEl.textContent = "游戏已准备，控制方向开始移动。";
      food = createFood();
      draw();
    }

    /**
     * 根据当前分数计算移动间隔。
     * 分数越高，间隔越短，蛇移动越快；设置下限避免速度过快导致不可玩。
     */
    function getGameSpeed() {
      return Math.max(86, 145 - Math.floor(score / 50) * 8);
    }

    /**
     * 启动循环。使用 setInterval 控制固定节奏，重启前会先清理旧定时器，
     * 避免重复创建定时器导致速度异常或内存泄漏。
     */
    function startLoop() {
      clearInterval(gameTimer);
      currentSpeed = getGameSpeed();
      gameTimer = setInterval(updateGame, currentSpeed);
      gameRunning = true;
      updateStartButtonLabel();
    }

    /**
     * 主更新函数：每个时间间隔执行一次。
     * 这里只做一次状态推进，不使用 while 死循环，因此不会造成浏览器卡顿。
     */
    function updateGame() {
      if (!gameRunning || gamePaused || gameOver) {
        return;
      }

      // 将“下一方向”提交为当前方向，实现键盘输入和游戏循环之间的节奏同步。
      direction = nextDirection;

      const currentHead = snake[0];
      const newHead = {
        x: currentHead.x + direction.x,
        y: currentHead.y + direction.y
      };

      // 先判断撞墙：普通模式直接结束，穿墙模式则把蛇头移动到对侧边界。
      if (hitWall(newHead)) {
        if (wrapMode) {
          wrapHeadPosition(newHead);
        } else {
          endGame("撞到墙壁，游戏结束。");
          return;
        }
      }

      // 判断是否吃到食物。吃到食物时本轮不删除尾巴，实现身体增长。
      const ateFood = newHead.x === food.x && newHead.y === food.y;

      /*
        自撞检测要考虑“尾巴即将移动”的情况：
        如果本轮没有吃到食物，尾巴会被删除，所以新蛇头移动到旧尾巴位置是合法的。
        因此检测用的身体数组在未吃食物时排除最后一个节点。
      */
      const bodyToCheck = ateFood ? snake : snake.slice(0, -1);
      if (hitSelf(newHead, bodyToCheck)) {
        endGame("咬到自己，游戏结束。");
        return;
      }

      snake.unshift(newHead);

      if (ateFood) {
        score += 10;
        scoreEl.textContent = score;
        food = createFood();
        statusEl.textContent = "吃到食物，身体变长。";

        // 分数变化后只有在速度档位改变时才重置定时器，减少蛇变长时的卡顿感。
        if (getGameSpeed() !== currentSpeed) {
          startLoop();
        }
      } else {
        snake.pop();
      }

      draw();
    }

    /**
     * 随机生成食物。
     * 使用 do...while 保证食物不会刷新在蛇身上。
     */
    function createFood() {
      let newFood;
      do {
        newFood = {
          x: Math.floor(Math.random() * tileCount),
          y: Math.floor(Math.random() * tileCount)
        };
      } while (snake.some(segment => segment.x === newFood.x && segment.y === newFood.y));

      return newFood;
    }

    /**
     * 撞墙检测：蛇头坐标小于 0 或超过最大网格坐标即为撞墙。
     */
    function hitWall(head) {
      return head.x < 0 || head.y < 0 || head.x >= tileCount || head.y >= tileCount;
    }

    /**
     * 穿墙模式坐标换算：
     * 左侧越界会出现在最右侧，右侧越界会出现在最左侧；
     * 上下边界同理。这里直接修改蛇头对象，后续吃食物和自撞检测可继续复用。
     */
    function wrapHeadPosition(head) {
      if (head.x < 0) {
        head.x = tileCount - 1;
      } else if (head.x >= tileCount) {
        head.x = 0;
      }

      if (head.y < 0) {
        head.y = tileCount - 1;
      } else if (head.y >= tileCount) {
        head.y = 0;
      }
    }

    /**
     * 自撞检测：只要蛇头和任意身体节点重合，就说明咬到了自己。
     */
    function hitSelf(head, body) {
      return body.some(segment => segment.x === head.x && segment.y === head.y);
    }

    /**
     * 结束游戏：停止循环、记录最高分、刷新界面提示。
     */
    function endGame(message) {
      gameOver = true;
      gameRunning = false;
      clearInterval(gameTimer);
      updateStartButtonLabel();

      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem("snakeBestScore", String(bestScore));
        bestScoreEl.textContent = bestScore;
      }

      statusEl.textContent = `${message} 本局得分：${score}。`;
      draw();
    }

    /**
     * 绘制背景网格、食物、蛇身和结束遮罩。
     * Canvas 每次重绘前都会清空整张画布，避免残影和无效图形堆积。
     */
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBoard();
      drawFood();
      drawSnake();

      if (gameOver) {
        drawGameOverMask();
      } else if (gamePaused) {
        drawPauseMask();
      }
    }

    /**
     * 创建棋盘缓存。
     * 棋盘背景和网格线不会随蛇移动变化，因此只绘制到离屏 Canvas 一次，
     * 主画布每帧直接复制缓存，避免蛇身变长后还重复绘制大量静态线条。
     */
    function createBoardCache() {
      boardCacheCtx.fillStyle = "#16222d";
      boardCacheCtx.fillRect(0, 0, boardCache.width, boardCache.height);

      boardCacheCtx.strokeStyle = "rgba(255, 255, 255, 0.045)";
      boardCacheCtx.lineWidth = 1;

      for (let i = 0; i <= tileCount; i++) {
        const position = i * cellSize + 0.5;
        boardCacheCtx.beginPath();
        boardCacheCtx.moveTo(position, 0);
        boardCacheCtx.lineTo(position, boardCache.height);
        boardCacheCtx.stroke();

        boardCacheCtx.beginPath();
        boardCacheCtx.moveTo(0, position);
        boardCacheCtx.lineTo(boardCache.width, position);
        boardCacheCtx.stroke();
      }
    }

    /**
     * 绘制棋盘背景：直接复制离屏缓存，降低每帧绘制成本。
     */
    function drawBoard() {
      ctx.drawImage(boardCache, 0, 0);
    }

    /**
     * 绘制食物：用圆形和高光让目标更醒目。
     */
    function drawFood() {
      const centerX = food.x * cellSize + cellSize / 2;
      const centerY = food.y * cellSize + cellSize / 2;

      ctx.fillStyle = "#f0c04f";
      ctx.beginPath();
      ctx.arc(centerX, centerY, cellSize * 0.38, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "rgba(255, 255, 255, 0.7)";
      ctx.beginPath();
      ctx.arc(centerX - 3, centerY - 4, cellSize * 0.12, 0, Math.PI * 2);
      ctx.fill();
    }

    /**
     * 绘制蛇：蛇头和身体使用不同颜色，便于玩家识别移动方向。
     */
    function drawSnake() {
      snake.forEach((segment, index) => {
        const x = segment.x * cellSize;
        const y = segment.y * cellSize;
        const inset = index === 0 ? 2 : 3;

        if (index === 0) {
          ctx.fillStyle = "#33d09a";
          roundRect(x + inset, y + inset, cellSize - inset * 2, cellSize - inset * 2, 6);
          ctx.fill();
          drawSnakeEyes(segment);
        } else {
          ctx.fillStyle = "#1f9f78";
          ctx.fillRect(x + inset, y + inset, cellSize - inset * 2, cellSize - inset * 2);
        }
      });
    }

    /**
     * 根据移动方向绘制蛇眼，让蛇头更有方向感。
     */
    function drawSnakeEyes(head) {
      const baseX = head.x * cellSize;
      const baseY = head.y * cellSize;
      const eyeOffsetX = direction.x === 0 ? 5 : direction.x > 0 ? 12 : 5;
      const eyeOffsetY = direction.y === 0 ? 5 : direction.y > 0 ? 12 : 5;

      ctx.fillStyle = "#0d1b24";

      if (direction.x !== 0) {
        ctx.beginPath();
        ctx.arc(baseX + eyeOffsetX, baseY + 6, 2, 0, Math.PI * 2);
        ctx.arc(baseX + eyeOffsetX, baseY + 14, 2, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.beginPath();
        ctx.arc(baseX + 6, baseY + eyeOffsetY, 2, 0, Math.PI * 2);
        ctx.arc(baseX + 14, baseY + eyeOffsetY, 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    /**
     * Canvas 没有直接的圆角矩形 API 兼容写法，这里封装一个绘制路径的小工具。
     */
    function roundRect(x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    /**
     * 游戏结束遮罩：不影响游戏状态，只提供视觉反馈。
     */
    function drawGameOverMask() {
      ctx.fillStyle = "rgba(13, 27, 36, 0.72)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#ffffff";
      ctx.font = "700 34px 'Microsoft YaHei', sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("游戏结束", canvas.width / 2, canvas.height / 2 - 12);

      ctx.fillStyle = "#f0c04f";
      ctx.font = "500 18px 'Microsoft YaHei', sans-serif";
      const restartTip = document.body.classList.contains("mobile-device")
        ? "点击重新开始再来一局"
        : "点击重新开始或按空格再来一局";
      ctx.fillText(restartTip, canvas.width / 2, canvas.height / 2 + 28);
    }

    /**
     * 暂停遮罩：和游戏结束遮罩保持一致的视觉层级，但不改变蛇和食物数据。
     */
    function drawPauseMask() {
      ctx.fillStyle = "rgba(13, 27, 36, 0.62)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#ffffff";
      ctx.font = "700 34px 'Microsoft YaHei', sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("游戏暂停", canvas.width / 2, canvas.height / 2 - 12);

      ctx.fillStyle = "#f0c04f";
      ctx.font = "500 18px 'Microsoft YaHei', sans-serif";
      ctx.fillText("点击继续返回游戏", canvas.width / 2, canvas.height / 2 + 28);
    }

    /**
     * 修改移动方向。
     * 关键规则：蛇不能在同一格内直接反向，否则会立刻撞到自己的第二节身体。
     */
    function changeDirection(newDirection) {
      const isOpposite =
        newDirection.x + direction.x === 0 &&
        newDirection.y + direction.y === 0;

      if (!isOpposite) {
        nextDirection = newDirection;
      }
    }

    /**
     * 处理键盘输入：支持方向键和 W A S D。
     */
    function handleKeyDown(event) {
      const keyMap = {
        ArrowUp: { x: 0, y: -1 },
        KeyW: { x: 0, y: -1 },
        ArrowDown: { x: 0, y: 1 },
        KeyS: { x: 0, y: 1 },
        ArrowLeft: { x: -1, y: 0 },
        KeyA: { x: -1, y: 0 },
        ArrowRight: { x: 1, y: 0 },
        KeyD: { x: 1, y: 0 }
      };

      if (event.code === "Space") {
        event.preventDefault();

        if (gameOver && !document.body.classList.contains("mobile-device")) {
          restartGame("新一局开始。");
          return;
        }

        togglePause();
        return;
      }

      if (keyMap[event.code]) {
        event.preventDefault();
        changeDirection(keyMap[event.code]);

        // 首次按方向键时自动开始，减少一步点击操作。
        if (!gameRunning && !gameOver) {
          startLoop();
          updateStartButtonLabel();
          statusEl.textContent = "游戏进行中。";
        }
      }

    }

    /**
     * 暂停与继续：只切换状态，不销毁蛇和食物数据。
     */
    function togglePause() {
      if (gameOver || !gameRunning) {
        return;
      }

      gamePaused = !gamePaused;
      updatePauseButtonLabel();
      updateStartButtonLabel();
      statusEl.textContent = gamePaused ? "游戏已暂停。" : "游戏继续。";
      draw();
    }

    /**
     * 根据当前暂停状态更新手机端中间按钮文字。
     * 游戏暂停时显示“继续”，其他状态统一显示“暂停”。
     */
    function updatePauseButtonLabel() {
      pauseTouchBtn.textContent = gamePaused ? "继续" : "暂停";
      pauseTouchBtn.setAttribute("aria-label", gamePaused ? "继续游戏" : "暂停游戏");
    }

    /**
     * 根据游戏状态更新电脑端主按钮文字。
     * 未开始显示“开始游戏”，运行中显示“暂停游戏”，暂停时显示“继续游戏”。
     */
    function updateStartButtonLabel() {
      if (gameOver) {
        startBtn.textContent = "开始游戏";
      } else if (gamePaused) {
        startBtn.textContent = "继续游戏";
      } else if (gameRunning) {
        startBtn.textContent = "暂停游戏";
      } else {
        startBtn.textContent = "开始游戏";
      }
    }

    /**
     * 更新模式按钮文字，让当前边界规则始终可见。
     */
    function updateModeButtonLabel() {
      modeBtn.textContent = wrapMode ? "穿墙模式：开" : "穿墙模式：关";
    }

    /**
     * 统一的重新开始入口，按钮和电脑端空格快捷键都走这里。
     */
    function restartGame(message) {
      clearInterval(gameTimer);
      resetGame();
      startLoop();
      statusEl.textContent = message;
    }

    /**
     * 判断是否按手机或触屏设备处理页面。
     * 同时参考屏幕宽度、触控能力和浏览器 UA，兼顾 iPhone、Android 和窄屏触控设备。
     */
    function isMobileDevice() {
      const userAgent = navigator.userAgent || navigator.vendor || "";
      const hasTouch = "ontouchstart" in window || navigator.maxTouchPoints > 0;
      const isSmallScreen = window.matchMedia("(max-width: 640px)").matches;
      const isMobileUA = /Android|iPhone|iPad|iPod|Mobile/i.test(userAgent);

      return isMobileUA || (hasTouch && isSmallScreen);
    }

    /**
     * 应用手机端页面状态。
     * 只通过 body 类名切换界面，核心游戏逻辑保持一致，避免维护两套玩法代码。
     */
    function applyDeviceLayout() {
      document.body.classList.toggle("mobile-device", isMobileDevice());
    }

    /**
     * 手机触控输入：点击方向键后复用键盘的方向切换逻辑。
     * pointerdown 比 click 响应更快，并可避免移动端 300ms 点击延迟问题。
     */
    function handleTouchControl(event) {
      const button = event.target.closest("button");
      if (!button || button.disabled) {
        return;
      }

      event.preventDefault();

      const action = button.dataset.action;
      const directionName = button.dataset.direction;

      if (action === "pause") {
        togglePause();
        return;
      }

      if (directionName && directionMap[directionName]) {
        changeDirection(directionMap[directionName]);

        // 手机端首次按方向键也自动开局，体验和键盘端保持一致。
        if (!gameRunning && !gameOver) {
          startLoop();
          updateStartButtonLabel();
          statusEl.textContent = "游戏进行中。";
        }
      }
    }

    /**
     * 记录手机滑动起点。
     * 只在手机布局中处理滑动，避免影响桌面浏览器的鼠标操作。
     */
    function handleSwipeStart(event) {
      if (!document.body.classList.contains("mobile-device") || event.touches.length === 0) {
        return;
      }

      const touch = event.touches[0];
      swipeStartX = touch.clientX;
      swipeStartY = touch.clientY;
    }

    /**
     * 根据滑动距离判断方向。
     * 达到阈值后立即改变方向，并把当前触点作为新的起点，支持连续滑动转向。
     */
    function handleSwipeMove(event) {
      if (!document.body.classList.contains("mobile-device") || event.touches.length === 0) {
        return;
      }

      event.preventDefault();

      const touch = event.touches[0];
      const deltaX = touch.clientX - swipeStartX;
      const deltaY = touch.clientY - swipeStartY;
      const absX = Math.abs(deltaX);
      const absY = Math.abs(deltaY);

      if (Math.max(absX, absY) < swipeThreshold) {
        return;
      }

      const directionName = absX > absY
        ? deltaX > 0 ? "right" : "left"
        : deltaY > 0 ? "down" : "up";

      changeDirection(directionMap[directionName]);

      // 手机端首次滑动也自动开局，和触控按键行为保持一致。
      if (!gameRunning && !gameOver) {
        startLoop();
        updateStartButtonLabel();
        statusEl.textContent = "游戏进行中。";
      }

      swipeStartX = touch.clientX;
      swipeStartY = touch.clientY;
    }

    startBtn.addEventListener("click", () => {
      if (gameOver) {
        restartGame("新一局开始。");
        return;
      }

      if (gameRunning) {
        togglePause();
        return;
      }

      startLoop();
      statusEl.textContent = "游戏进行中。";
    });

    restartBtn.addEventListener("click", () => {
      restartGame("新一局开始。");
    });

    modeBtn.addEventListener("click", () => {
      wrapMode = !wrapMode;
      updateModeButtonLabel();
      statusEl.textContent = wrapMode
        ? "穿墙模式已开启，撞到边界会从对侧出现。"
        : "穿墙模式已关闭，撞到边界会游戏结束。";
    });

    document.addEventListener("keydown", handleKeyDown);
    mobileControls.addEventListener("pointerdown", handleTouchControl);
    boardWrap.addEventListener("touchstart", handleSwipeStart, { passive: false });
    boardWrap.addEventListener("touchmove", handleSwipeMove, { passive: false });
    window.addEventListener("resize", applyDeviceLayout);
    window.addEventListener("orientationchange", applyDeviceLayout);

    // 页面加载后先绘制静态初始状态，用户无需点击也能看到完整棋盘。
    applyDeviceLayout();
    updateModeButtonLabel();
    createBoardCache();
    resetGame();
  </script>
</body>
</html>
